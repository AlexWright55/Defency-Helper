<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика персонажа</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: rgba(20, 20, 25, 0.95);
            color: #ffffff;
            padding: 20px;
            user-select: none;
            -webkit-user-select: none;
            overflow-y: auto;
            cursor: default;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .nickname {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 5px;
        }

        .login-time {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
        }

        .section {
            background: rgba(30, 30, 35, 0.8);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title .icon {
            font-size: 18px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #999;
            font-size: 13px;
        }

        .info-value {
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            text-align: right;
        }

        .info-value.gold {
            color: #ffd700;
            font-weight: bold;
        }

        .info-value.green {
            color: #4caf50;
            font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .stat-card {
            background: rgba(40, 40, 45, 0.6);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }

        .stat-card .label {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
        }

        .stat-card .value {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
        }

        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .btn-refresh {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 15px;
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-refresh:active {
            transform: translateY(0);
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 11px;
            color: #555;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.03);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.25);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="nickname" id="nickname">Загрузка...</div>
            <div class="login-time" id="loginTime"></div>
        </div>

        <div class="section">
            <div class="section-title">
                <span class="icon">??</span> Основная информация
            </div>
            <div id="mainInfo"></div>
        </div>

        <div class="section">
            <div class="section-title">
                <span class="icon">??</span> Характеристики
            </div>
            <div class="stats-grid" id="characteristics"></div>
        </div>

        <div class="section">
            <div class="section-title">
                <span class="icon">??</span> Финансы
            </div>
            <div id="finances"></div>
        </div>

        <div class="section" id="statusSection" style="display:none;">
            <div class="section-title">
                <span class="icon">?</span> Статус
            </div>
            <div id="statusInfo"></div>
        </div>

        <button class="btn-refresh" onclick="refreshStats()">?? Обновить статистику</button>
        <div class="footer">Defency Helper CEF Stats | Обновлено: <span id="updateTime">-</span></div>
    </div>

    <script>
        function refreshStats() {
            if (window.callHandler) {
                window.callHandler('refresh');
            }
        }

        function updateStats(jsonData) {
            try {
                var data = typeof jsonData === 'string' ? JSON.parse(jsonData) : jsonData;
                
                document.getElementById('nickname').textContent = data.nickname || 'Неизвестно';
                document.getElementById('loginTime').textContent = data.loginTime || '';
                document.getElementById('updateTime').textContent = data.statsUpdated || os.date("%H:%M:%S");

                // Основная информация
                var mainInfo = document.getElementById('mainInfo');
                mainInfo.innerHTML = '';
                if (data.mainInfo) {
                    data.mainInfo.forEach(function(item) {
                        var row = document.createElement('div');
                        row.className = 'info-row';
                        row.innerHTML = 
                            '<span class="info-label">' + item.label + '</span>' +
                            '<span class="info-value">' + item.value + '</span>';
                        mainInfo.appendChild(row);
                    });
                }

                // Характеристики
                var chars = document.getElementById('characteristics');
                chars.innerHTML = '';
                if (data.characteristics) {
                    data.characteristics.forEach(function(item) {
                        var card = document.createElement('div');
                        card.className = 'stat-card';
                        card.innerHTML = 
                            '<div class="label">' + item.label + '</div>' +
                            '<div class="value">' + item.value + '</div>';
                        chars.appendChild(card);
                    });
                }

                // Финансы
                var finances = document.getElementById('finances');
                finances.innerHTML = '';
                if (data.finances) {
                    data.finances.forEach(function(item) {
                        var row = document.createElement('div');
                        row.className = 'info-row';
                        row.innerHTML = 
                            '<span class="info-label">' + item.label + '</span>' +
                            '<span class="info-value gold">' + item.value + '</span>';
                        finances.appendChild(row);
                    });
                }

                // Статус
                if (data.status && data.status !== '') {
                    document.getElementById('statusSection').style.display = 'block';
                    var statusInfo = document.getElementById('statusInfo');
                    statusInfo.innerHTML = '<span class="status-badge">' + data.status + '</span>';
                }

            } catch (e) {
                console.error('Error parsing stats data:', e);
            }
        }

        // Проверяем, есть ли отложенные данные
        if (window._pendingStatsData) {
            updateStats(window._pendingStatsData);
            window._pendingStatsData = null;
        }
    </script>
</body>
</html>
